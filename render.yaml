services:
  # Backend Spring Boot (API REST)
  - name: musicmakers-backend
    type: web
    runtime: docker
    # plan: free
    dockerfilePath: ./backend-springboot/Projeto/Dockerfile
    dockerContext: ./backend-springboot/Projeto
    envVars:
      # Banco de dados (Supabase) — preencha manualmente no dashboard do Render
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: SPRING_FLYWAY_ENABLED
        value: "true"
      - key: JPA_DDL_AUTO
        value: validate
      - key: JPA_SHOW_SQL
        value: "false"
      # Segurança
      - key: JWT_SECRET
        generateValue: true
      # CORS — defina como a URL do frontend depois do primeiro deploy (ex: https://musicmakers-frontend.onrender.com)
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # URL pública do frontend — usada para montar o link de redefinição de senha no e-mail
      # (ex: https://musicmakers-frontend.onrender.com), defina depois do primeiro deploy
      - key: FRONTEND_URL
        sync: false
      # E-mail (opcional — recuperação de senha)
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      # Login com Google (opcional)
      - key: GOOGLE_CLIENT_ID
        sync: false
      # Logging
      - key: LOG_LEVEL_SECURITY
        value: INFO
      - key: LOG_LEVEL_WEB
        value: INFO

  # Frontend estático (HTML/CSS/JS puro)
  - name: musicmakers-frontend
    type: web
    runtime: static
    # plan: free
    rootDir: frontend
    buildCommand: node generate-config.js
    staticPublishPath: .
    envVars:
      # URL pública do backend (defina após o deploy do backend, ex: https://musicmakers-backend.onrender.com)
      - key: API_BASE_URL
        sync: false
