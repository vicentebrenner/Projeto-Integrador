server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

jwt.secret=${JWT_SECRET:MinhaChaveSuperSecretaDeDesenvolvimento123456}

# --- Banco de Dados (Postgres / Supabase em produĂ§Ă£o) ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:musicmakers_db}?sslmode=${DB_SSLMODE:prefer}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}

# --- E-mail ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:fake@email.com}
spring.mail.password=${MAIL_PASSWORD:fake}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- URL do frontend (usada para montar o link de redefiniĂ§Ă£o de senha no e-mail) ---
app.frontend-url=${FRONTEND_URL:http://localhost:5500}

# --- CORS ---
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://127.0.0.1,http://127.0.0.1:5500,http://localhost:5500,http://localhost:8080}

